services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
      target: web
    container_name: ais-prod-web
    restart: unless-stopped
    ports:
      - "3300:3000"
    env_file:
      - ../.env.production
    volumes:
      # Gemini CLI OAuth 인증 — Playground(tRPC)에서 사용
      - ${HOME}/.gemini:/root/.gemini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ais-prod-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker
    container_name: ais-prod-worker
    restart: unless-stopped
    env_file:
      - ../.env.production
    volumes:
      # Gemini CLI OAuth 인증 — 호스트 ~/.gemini를 컨테이너에 바인드 마운트
      - ${HOME}/.gemini:/root/.gemini
      # HuggingFace/Xenova 모델 캐시 영속화 — 컨테이너 재시작 시 재다운로드 방지
      - ais-prod-model-cache:/root/.cache/xenova
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ais-prod-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ais-prod-postgres
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: ai_signalcraft
      POSTGRES_USER: ${POSTGRES_USER:-ais}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ais-prod-pgdata:/var/lib/postgresql/data
    networks:
      - ais-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ais}"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7
    container_name: ais-prod-redis
    restart: unless-stopped
    command: redis-server --maxmemory 1gb --maxmemory-policy noeviction --appendonly yes
    ports:
      - "6385:6379"
    volumes:
      - ais-prod-redis:/data
    networks:
      - ais-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  ais-prod-pgdata:
  ais-prod-redis:
  ais-prod-model-cache:

networks:
  ais-prod-network:
    driver: bridge
