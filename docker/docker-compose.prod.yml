services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
      target: web
    container_name: ais-prod-web
    restart: unless-stopped
    ports:
      - "3300:3000"
    env_file:
      - ../.env.production
    depends_on:
      - postgres
      - redis
    networks:
      - ais-prod-network

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker
    container_name: ais-prod-worker
    restart: unless-stopped
    env_file:
      - ../.env.production
    depends_on:
      - postgres
      - redis
    networks:
      - ais-prod-network

  postgres:
    image: postgres:16
    container_name: ais-prod-postgres
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: ai_signalcraft
      POSTGRES_USER: ${POSTGRES_USER:-ais}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ais-prod-pgdata:/var/lib/postgresql/data
    networks:
      - ais-prod-network

  redis:
    image: redis:7
    container_name: ais-prod-redis
    restart: unless-stopped
    ports:
      - "6385:6379"
    volumes:
      - ais-prod-redis:/data
    networks:
      - ais-prod-network

volumes:
  ais-prod-pgdata:
  ais-prod-redis:

networks:
  ais-prod-network:
    driver: bridge
