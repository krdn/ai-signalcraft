name: Auto Merge PR

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches-ignore: [main]

jobs:
  auto-merge:
    name: Auto Merge on CI Pass
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Find open PR for this branch
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const sha = context.payload.workflow_run.head_sha;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              head: `${context.repo.owner}:${branch}`,
            });

            if (prs.length === 0) {
              console.log(`브랜치 ${branch}에 열린 PR 없음`);
              core.setOutput('pr_number', '');
              return;
            }

            const pr = prs[0];
            console.log(`PR #${pr.number} 발견: ${pr.title}`);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_title', pr.title);
            core.setOutput('head_ref', pr.head.ref);

      - name: Squash merge PR
        if: steps.find-pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = parseInt('${{ steps.find-pr.outputs.pr_number }}');
            const pr_title = '${{ steps.find-pr.outputs.pr_title }}';
            const head_ref = '${{ steps.find-pr.outputs.head_ref }}';

            // merge 가능 상태 확인
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
            });

            if (pr.mergeable === false) {
              console.log(`PR #${pr_number} merge 불가 (conflict), 스킵`);
              return;
            }

            // squash merge 실행
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              merge_method: 'squash',
              commit_title: `${pr_title} (#${pr_number})`,
            });
            console.log(`✅ PR #${pr_number} squash merge 완료`);

            // 머지된 브랜치 삭제
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${head_ref}`,
              });
              console.log(`🗑️ 브랜치 ${head_ref} 삭제 완료`);
            } catch (e) {
              console.log(`브랜치 삭제 실패 (무시): ${e.message}`);
            }
