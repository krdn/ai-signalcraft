name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp ~/projects/ai/ai-signalcraft/.env.production .env.production

      - name: Build & Deploy (Docker Compose)
        working-directory: docker
        run: |
          docker compose -f docker-compose.prod.yml --env-file ../.env.production up -d --build
          echo "Deploy completed at $(date)"

      - name: Health Check
        run: |
          sleep 10
          curl -sf http://localhost:3300 > /dev/null && echo "Web OK" || echo "Web FAILED"
