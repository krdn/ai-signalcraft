name: Deploy

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # release 스크립트가 이전 커밋 이력을 조회함

      - name: Copy env file
        run: cp ~/projects/ai/ai-signalcraft/.env.production .env.production

      - name: DB Schema Push
        shell: bash -l {0}
        run: |
          source ~/.nvm/nvm.sh
          pnpm install --frozen-lockfile
          export DATABASE_URL=$(grep DATABASE_URL .env.production | sed 's/DATABASE_URL=//' | sed 's/@postgres:5432/@localhost:5438/')
          pnpm --filter @ai-signalcraft/core db:push
          echo "DB schema synced"

      - name: Collector Hypertable DDL (UNIQUE INDEX, compression, retention)
        shell: bash -l {0}
        run: |
          source ~/.nvm/nvm.sh
          # 하이퍼테이블 UNIQUE INDEX는 Drizzle push로 표현 불가 → apply-hypertables.ts (멱등) 실행.
          # 누락 시 executor의 ON CONFLICT가 실패해 모든 수집 run이 failed로 쌓임 (과거 2회 재발).
          export DATABASE_URL=$(grep ^COLLECTOR_DATABASE_URL .env.production | sed 's/COLLECTOR_DATABASE_URL=//' | sed 's|@host.docker.internal:5435|@localhost:5435|')
          if [ -z "$DATABASE_URL" ]; then
            echo "COLLECTOR_DATABASE_URL missing in .env.production"
            exit 1
          fi
          pnpm --filter @ai-signalcraft/collector db:migrate-timescale
          echo "Collector hypertable DDL applied"

      - name: Generate Release Draft
        shell: bash -l {0}
        continue-on-error: true
        run: |
          source ~/.nvm/nvm.sh
          export DATABASE_URL=$(grep ^DATABASE_URL .env.production | sed 's/DATABASE_URL=//' | sed 's/@postgres:5432/@localhost:5438/')
          export ANTHROPIC_API_KEY=$(grep ^ANTHROPIC_API_KEY .env.production | sed 's/ANTHROPIC_API_KEY=//')
          LAST_SHA=$(pnpm --silent --filter @ai-signalcraft/core exec tsx scripts/get-last-release-sha.ts)
          echo "Last release sha: $LAST_SHA"
          pnpm --filter @ai-signalcraft/core exec tsx scripts/generate-release.ts \
            --from "$LAST_SHA" --to "${{ github.sha }}" --gh-sha "${{ github.sha }}" \
            || echo "Release draft generation failed, continuing deploy"

      - name: Build & Deploy (Docker Compose)
        working-directory: docker
        run: |
          docker compose -f docker-compose.prod.yml --env-file ../.env.production build \
            web worker collector-api collector-worker collector-scheduler

          docker compose -f docker-compose.prod.yml --env-file ../.env.production up -d --no-deps \
            web worker collector-api collector-worker collector-scheduler
          echo "Deploy completed at $(date)"

      - name: Health Check
        run: |
          sleep 15
          if curl -sf http://localhost:3300 > /dev/null; then
            echo "Web OK"
          else
            echo "Web FAILED — 컨테이너 재시작 시도"
            docker start ais-prod-web 2>/dev/null || true
            sleep 5
            curl -sf http://localhost:3300 > /dev/null && echo "Web OK (재시작 후)" || echo "Web FAILED (재시작 후에도 실패)"
          fi

          if curl -sf http://localhost:3401/health > /dev/null 2>&1; then
            echo "Collector API OK"
          else
            echo "Collector API not yet responding (non-fatal)"
          fi

      - name: Publish Release
        if: success()
        shell: bash -l {0}
        continue-on-error: true
        run: |
          source ~/.nvm/nvm.sh
          export DATABASE_URL=$(grep ^DATABASE_URL .env.production | sed 's/DATABASE_URL=//' | sed 's/@postgres:5432/@localhost:5438/')
          pnpm --filter @ai-signalcraft/core exec tsx scripts/publish-release.ts --gh-sha "${{ github.sha }}"
